# SwiftLint configuration — focused rules for catching real bugs.
# Formatting is handled by swiftformat; these rules target correctness.

included:
  - Sources
  - Tests

opt_in_rules:
  - force_unwrapping

disabled_rules:
  - line_length          # swiftformat handles this
  - identifier_name      # too opinionated for CLI code
  - trailing_comma       # swiftformat handles this
  - opening_brace        # swiftformat handles this
  - type_name            # short names like IO are fine
  - for_where            # style preference, not a bug risk
  - unused_optional_binding  # `let _ =` in `if let` is idiomatic for existence checks
  - orphaned_doc_comment # false positives on NIO handler docs

force_cast:
  severity: error

function_body_length:
  warning: 120
  error: 120

cyclomatic_complexity:
  warning: 25
  error: 25

type_body_length:
  warning: 500
  error: 500

file_length:
  warning: 800
  error: 800
