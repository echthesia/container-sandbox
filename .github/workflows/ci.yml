name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    # Needs Xcode 26 / Swift 6.2. macos-latest still points at macos-15.
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test
