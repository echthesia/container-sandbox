name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0). Must not already exist as a release."
        required: true
        type: string

permissions:
  contents: write   # for `gh release create`

jobs:
  release:
    # Needs Xcode 26 / Swift 6.2. macos-latest still points at macos-15.
    runs-on: macos-26
    timeout-minutes: 30
    environment: release
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
      SIGN_IDENTITY: "Developer ID Application: MELISSA EMILY FOSTER (9363F8639X)"
      NOTARY_PROFILE: notary

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version
          go version

      - name: Import Developer ID certificate into temp keychain
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add the new keychain to the search list so codesign can find the identity
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          # Allow codesign to use the imported key without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Configure notarytool credentials
        env:
          NOTARY_API_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          P8_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$NOTARY_API_KEY_P8_BASE64" | base64 --decode -o "$P8_PATH"
          chmod 600 "$P8_PATH"
          xcrun notarytool store-credentials "$NOTARY_PROFILE" \
            --key "$P8_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID"

      - name: Build, sign, notarize, package
        run: |
          make package \
            VERSION="$VERSION" \
            SIGN_IDENTITY="$SIGN_IDENTITY" \
            NOTARY_PROFILE="$NOTARY_PROFILE"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; refusing to overwrite." >&2
            exit 1
          fi
          gh release create "$VERSION" \
            dist/*.tar.gz dist/*.tar.gz.sha256 \
            --title "$VERSION" \
            --generate-notes

      - name: Clean up secrets
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/cert.p12"
